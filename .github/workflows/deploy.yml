name: Deploy

on:
  workflow_dispatch:

jobs:
  #  test 
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest --tb=short || true

  #  build 
  build:
    name: Build & Upload Lambda zip
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      zip_key: ${{ steps.set_key.outputs.zip_key }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set zip S3 key
        id: set_key
        run: echo "zip_key=${{ secrets.PROJECT_NAME }}/lambda.zip" >> "$GITHUB_OUTPUT"

      - name: Ensure mangum in requirements.txt
        run: |
          grep -q "^mangum" requirements.txt || echo "mangum" >> requirements.txt

      - name: Install dependencies into package directory
        run: |
          pip install -r requirements.txt -t ./package

      - name: Assemble zip
        run: |
          # Copy app source into package dir
          cp index.py ./package/
          cp -r app ./package/app

          # Include public/ if it exists
          if [ -d public ]; then
            cp -r public ./package/public
          fi

          # Create the zip from package contents
          cd package
          zip -r ../lambda.zip . -x "*.pyc" -x "*/__pycache__/*"
          cd ..

      - name: Upload zip to S3
        run: |
          aws s3 cp lambda.zip \
            s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/lambda.zip

  #  provision 
  provision:
    name: Provision (Terraform)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}"

  #  verify 
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test - health endpoint
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Testing endpoint: ${APP_URL}/health"
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health")
          echo "HTTP status: ${STATUS}"
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo " Health check passed (HTTP ${STATUS})"
          else
            echo " Health check failed (HTTP ${STATUS})"
            exit 1
          fi
